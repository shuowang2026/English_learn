name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:   # 允许在 GitHub 页面手动触发

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 22（与项目 package.json 匹配）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装前端依赖
      - name: Install npm dependencies
        run: npm ci

      # 4. 构建 Web 资源（vite build）
      - name: Build web assets
        run: npm run build

      # 5. 用 cap sync 把 dist/ 同步到 android/ 并重写 capacitor.settings.gradle
      - name: Capacitor sync
        run: npx cap sync android

      # 6. 设置 JDK 17（Gradle 8.x 要求 JDK 17+）
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 7. 缓存 Gradle 依赖（加速后续构建，通常节省 3~5 分钟）
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 8. 授予 gradlew 执行权限
      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew

      # 9. 执行 Gradle 构建（debug APK）
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"

      # 10. 上传 APK 产物（保留 7 天，可在 Actions 页面直接下载）
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiubao-english-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
